<!DOCTYPE html><html lang='de'><head><meta charset='UTF-8'><title>Admin</title><link rel='stylesheet' href='styles.css'></head><body><main><h2>Letzte Bestellungen</h2><div id='adminView'></div><script>window.onload=function(){let e=document.getElementById('adminView');let d=JSON.parse(localStorage.getItem('bestellungen')||'[]');e.innerHTML=d.length?'<ul>'+d.map(b=>`<li>${b.name}: ${b.warenkorb}</li>`).join('')+'</ul>':'<p>Keine Daten</p>';}</script></main></body></html>
